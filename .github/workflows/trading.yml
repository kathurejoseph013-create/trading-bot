name: Trading Bot

on:
  schedule:
    - cron: '*/5 * * * *' # Runs every 5 minutes
  workflow_dispatch:      # Allows you to click "Run" manually for testing

jobs:
  run-bot:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'
      
      - name: Install dependencies
        run: pip install requests ratelimit pandas
      
      - name: Run Bot
        env:
          CAPITAL_API_KEY: ${{ secrets.CAPITAL_API_KEY }}
          CAPITAL_API_PASSWORD: ${{ secrets.CAPITAL_API_PASSWORD }}
          CAPITAL_EMAIL: ${{ secrets.CAPITAL_EMAIL }}
        run: python bot.py
